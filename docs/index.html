<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UpSkill Design System — Reference</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="Reference documentation for the UpSkill design system — token pipeline, component lifecycle, accessibility, layout grammar, governance, and agentic moments.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #D15D50; /* color.terracotta.9 — the brand primitive */
    }
    /* Mermaid diagrams scroll within their own container, never the page */
    .mermaid-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 1.5em 0;
    }
    .mermaid-scroll .mermaid { min-width: fit-content; }
    /* Wide tables scroll within their own box on narrow viewports */
    .markdown-section table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sidebar-nav li {
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'UpSkill Design System',
      repo: 'https://github.com/F4cu/upskill-design-system',
      homepage: '00-start-here.md',
      loadSidebar: true,
      alias: {
        '/decisions/_sidebar.md': '/_sidebar.md'
      },
      subMaxLevel: 2,
      auto2top: true,
      markdown: {
        renderer: {
          code: function (code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid-scroll"><div class="mermaid">' + code + '</div></div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (window.mermaid) {
              window.mermaid.run({ querySelector: '.mermaid' });
            }
          });
        }
      ]
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Strips the YAML `sources:` frontmatter (docs-check staleness gate) from rendered pages -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/front-matter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
