name: Token build check

on:
  push:
    branches: [main]
    paths:
      - 'packages/tokens/src/**'
      - 'packages/tokens/build.js'
      - 'packages/tokens/package.json'
  pull_request:
    paths:
      - 'packages/tokens/src/**'
      - 'packages/tokens/build.js'
      - 'packages/tokens/package.json'

jobs:
  build-tokens:
    name: Build tokens
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run tokens:build

      - name: Check token contrast (WCAG AA)
        run: npm run tokens:contrast-check

      - name: Verify output files exist
        run: |
          for f in \
            packages/tokens/dist/css/primitives.css \
            packages/tokens/dist/css/brand.upskill.css \
            packages/tokens/dist/css/theme.light.css \
            packages/tokens/dist/css/theme.dark.css \
            packages/tokens/dist/css/device.desktop.css \
            packages/tokens/dist/css/device.tablet.css \
            packages/tokens/dist/css/device.mobile.css \
            packages/tokens/dist/css/device.css \
            packages/tokens/dist/js/primitives.js \
            packages/tokens/dist/js/primitives.d.ts; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All expected output files present."

      - name: Save PR token dist
        if: github.event_name == 'pull_request'
        run: cp -r packages/tokens/dist /tmp/pr-dist

      - name: Checkout base for token diff
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .base

      - name: Build base tokens
        if: github.event_name == 'pull_request'
        working-directory: .base/packages/tokens
        run: npm install && node build.js

      - name: Generate token diff
        if: github.event_name == 'pull_request'
        run: node scripts/token-diff.js .base/packages/tokens/dist /tmp/pr-dist > /tmp/token-diff.md

      - name: Post token diff comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR}/comments" \
            --jq '.[] | select(.body | startswith("<!-- token-diff -->")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            jq -n --rawfile body /tmp/token-diff.md '{"body": $body}' | \
              gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" -X PATCH --input -
          else
            jq -n --rawfile body /tmp/token-diff.md '{"body": $body}' | \
              gh api "repos/${REPO}/issues/${PR}/comments" -X POST --input -
          fi
