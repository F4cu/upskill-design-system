name: Sync (post-merge)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/tokens/src/**"
      # any component source change can move the derived snapshots
      # (token-usage.json, component-pipeline.json, STATUS_QUO.md)
      - "packages/components/src/**"
      - ".claude/handoff/**"
      - ".claude/component-signoff.json"

concurrency:
  group: airtable-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync primitive tokens to Airtable
        run: node scripts/airtable-sync.js push:primitives
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Sync semantic tokens to Airtable
        run: node scripts/airtable-sync.js push:semantic
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Sync device tokens to Airtable
        run: node scripts/airtable-sync.js push:device
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Refresh token usage map
        run: node scripts/token-usage.js

      - name: Derive component pipeline (sense)
        run: node scripts/sense.js

      - name: Sync component metadata to Airtable
        run: node scripts/airtable-sync.js push:components
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      # Derived snapshots only change as a consequence of a merge, so the
      # post-merge sync recommits them rather than a PR staleness gate policing
      # them. GITHUB_TOKEN pushes never trigger other workflows, so this cannot
      # loop; [skip ci] is belt-and-braces.
      - name: Commit refreshed snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/component-pipeline.json .claude/component-review-state.json .claude/STATUS_QUO.md packages/tokens/token-usage.json
          if git diff --cached --quiet; then
            echo "Snapshots unchanged."
          else
            git commit -m "chore: refresh frozen snapshots after merge [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
