name: Sync tokens

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/tokens/src/**"

concurrency:
  group: airtable-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync primitive tokens to Airtable
        run: node scripts/airtable-sync.js push:primitives
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Sync semantic tokens to Airtable
        run: node scripts/airtable-sync.js push:semantic
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      - name: Sync device tokens to Airtable
        run: node scripts/airtable-sync.js push:device
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
