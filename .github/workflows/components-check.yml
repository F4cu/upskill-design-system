name: Component check

on:
  pull_request:
    paths:
      - 'packages/components/**'
      - 'packages/tokens/**'
      - 'scripts/validate-metadata.js'
      - 'scripts/a11y-coverage.js'
      - 'scripts/a11y-backlog.json'
      - 'scripts/generate-pattern-schema.js'
      - 'scripts/screenshot.js'
      - '.claude/component-patterns.json'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: components-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-components:
    name: Typecheck, build, validate metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run tokens:build

      - name: Lint (Tier-1 a11y via jsx-a11y)
        run: npm run lint

      - name: Validate component metadata
        run: npm run metadata:validate

      - name: Typecheck components
        run: npm run typecheck

      - name: Build components
        run: npm run build -w @upskill/components

      - name: a11y coverage gate (interactive components have a behavioral test)
        run: npm run a11y:coverage

      - name: Behavioral a11y tests
        run: npm run a11y:test

      - name: Story axe sweep (every story, issue #72)
        run: npm run a11y:stories

      - name: Screenshot baseline check (ADR-019 — advisory while baselines are macOS-generated)
        continue-on-error: true
        env:
          # Baselines are macOS-generated; ubuntu antialiasing differs, so CI
          # tolerates 1% vs the strict local default. See ADR-019.
          SCREENSHOT_DIFF_RATIO: "0.01"
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps
          npm run build:storybook -w @upskill/components
          npx http-server packages/components/storybook-static -p 6006 &
          for i in $(seq 1 30); do curl -sf http://localhost:6006/index.json > /dev/null && break; sleep 1; done
          npm run screenshot:check

      - name: Pattern schema staleness check (ADR-013)
        # -I ignores the generatedFrom commit-sha line, which legitimately
        # differs between the committed file and a CI regeneration
        run: |
          npm run patterns:generate
          git diff --exit-code -I'"generatedFrom"' -- .claude/component-patterns.json
