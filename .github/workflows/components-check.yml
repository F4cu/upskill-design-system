name: Component check

on:
  pull_request:
    paths:
      - 'packages/components/**'
      - 'packages/tokens/**'
      - 'scripts/validate-metadata.js'
      - 'scripts/a11y-coverage.js'
      - 'scripts/a11y-backlog.json'
      - 'scripts/generate-pattern-schema.js'
      - '.claude/component-patterns.json'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: components-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-components:
    name: Typecheck, build, validate metadata
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build tokens
        run: npm run tokens:build

      - name: Lint (Tier-1 a11y via jsx-a11y)
        run: npm run lint

      - name: Validate component metadata
        run: npm run metadata:validate

      - name: Typecheck components
        run: npm run typecheck

      - name: Build components
        run: npm run build -w @upskill/components

      - name: a11y coverage gate (interactive components have a behavioral test)
        run: npm run a11y:coverage

      - name: Behavioral a11y tests
        run: npm run a11y:test

      - name: Pattern schema staleness check (ADR-013)
        # -I ignores the generatedFrom commit-sha line, which legitimately
        # differs between the committed file and a CI regeneration
        run: |
          npm run patterns:generate
          git diff --exit-code -I'"generatedFrom"' -- .claude/component-patterns.json
